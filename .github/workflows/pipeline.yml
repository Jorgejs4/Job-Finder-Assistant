name: Pipeline Completo (Scraper + Analyze + Refilter)

on:
  schedule:
    - cron: '0 7,19 * * *'
  workflow_dispatch:
    inputs:
      desired_locations:
        description: 'Ubicaciones de búsqueda (separadas por comas)'
        required: false
        default: 'Sevilla,Remoto'
      years_of_experience:
        description: 'Años de experiencia'
        required: false
        default: '0'
      min_salary:
        description: 'Salario mínimo'
        required: false
        default: '20000'
      analyze_limit:
        description: 'Máx ofertas a analizar (0=todas)'
        required: false
        default: '0'
      analyze_workers:
        description: 'Hilos Gemini (1-3)'
        required: false
        default: '1'

concurrency:
  group: pipeline-run
  cancel-in-progress: true

permissions:
  contents: write

env:
  DESIRED_LOCATIONS: ${{ github.event.inputs.desired_locations || secrets.DESIRED_LOCATIONS || 'Sevilla,Remoto' }}
  YEARS_OF_EXPERIENCE: ${{ github.event.inputs.years_of_experience || secrets.YEARS_OF_EXPERIENCE || '0' }}
  MIN_SALARY: ${{ github.event.inputs.min_salary || secrets.MIN_SALARY || '20000' }}
  ANALYZE_LIMIT: ${{ github.event.inputs.analyze_limit || '0' }}
  ANALYZE_WORKERS: ${{ github.event.inputs.analyze_workers || '1' }}
  USER_CITY: ${{ secrets.USER_CITY || 'sevilla' }}

jobs:
  test-scrapers:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run scraper tests
      env:
        MOCK_GEMINI: 'true'
        GEMINI_API_KEY: 'test-mock-key'
        DESIRED_LOCATIONS: 'Remoto'
      run: python tests/test_scrapers.py
    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: scraper-test-report
        path: results/test_report.json
        retention-days: 30

  scrape:
    needs: test-scrapers
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-pipeline-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-buildx-pipeline-
    - name: Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile
        load: true
        tags: job-scraper:latest
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
    - name: Run Scraper (Fase 1)
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        SMTP_GMAIL_USER: ${{ secrets.SMTP_GMAIL_USER }}
        SMTP_GMAIL_PASSWORD: ${{ secrets.SMTP_GMAIL_PASSWORD }}
        NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
        WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        WEBHOOK_MIN_MATCH: ${{ secrets.WEBHOOK_MIN_MATCH }}
        CV_PATH: 'cv.pdf'
      run: |
        mkdir -p results
        docker run --rm \
          -v "$(pwd)/results:/app/results" \
          -e GEMINI_API_KEY="$GEMINI_API_KEY" \
          -e GEMINI_API_KEYS="$GEMINI_API_KEYS" \
          -e NOTION_TOKEN="$NOTION_TOKEN" \
          -e NOTION_DATABASE_ID="$NOTION_DATABASE_ID" \
          -e RAPIDAPI_KEY="$RAPIDAPI_KEY" \
          -e SMTP_GMAIL_USER="$SMTP_GMAIL_USER" \
          -e SMTP_GMAIL_PASSWORD="$SMTP_GMAIL_PASSWORD" \
          -e NOTIFY_EMAIL="$NOTIFY_EMAIL" \
          -e JOOBLE_API_KEY="$JOOBLE_API_KEY" \
          -e WEBHOOK_URL="$WEBHOOK_URL" \
          -e WEBHOOK_MIN_MATCH="$WEBHOOK_MIN_MATCH" \
          -e DESIRED_LOCATIONS="$DESIRED_LOCATIONS" \
          -e YEARS_OF_EXPERIENCE="$YEARS_OF_EXPERIENCE" \
          -e MIN_SALARY="$MIN_SALARY" \
          -e USER_CITY="$USER_CITY" \
          -e CV_PATH="$CV_PATH" \
          job-scraper:latest
    - name: Upload scraper results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: scraper-results-${{ github.run_id }}
        path: results/
        retention-days: 90
    - name: Commit data.json tras scrape
      if: always()
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if [ -f results/data.json ]; then
          git add results/data.json results/cvs/
          if [ -f results/feedback.json ]; then git add results/feedback.json; fi
          if ! git diff --cached --quiet; then
            git commit -m "Scrape complete [skip ci]"
            git push --force-with-lease origin main
          fi
        fi

  analyze:
    needs: scrape
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-pipeline-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-buildx-pipeline-
    - name: Build Docker Image (reutiliza cache)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile
        load: true
        tags: job-scraper:latest
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
    - name: Run Analyze (Fase 2)
      env:
        PYTHONUNBUFFERED: '1'
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        CV_PATH: 'cv.pdf'
      run: |
        mkdir -p results
        docker run --rm \
          -v "$(pwd)/results:/app/results" \
          -e PYTHONUNBUFFERED=1 \
          -e GEMINI_API_KEY="$GEMINI_API_KEY" \
          -e GEMINI_API_KEYS="$GEMINI_API_KEYS" \
          -e NOTION_TOKEN="$NOTION_TOKEN" \
          -e NOTION_DATABASE_ID="$NOTION_DATABASE_ID" \
          -e DESIRED_LOCATIONS="$DESIRED_LOCATIONS" \
          -e YEARS_OF_EXPERIENCE="$YEARS_OF_EXPERIENCE" \
          -e MIN_SALARY="$MIN_SALARY" \
          -e USER_CITY="$USER_CITY" \
          -e CV_PATH="$CV_PATH" \
          job-scraper:latest \
          python analyze_pending.py --limit "$ANALYZE_LIMIT" --workers "$ANALYZE_WORKERS"
    - name: Commit data.json tras analyze
      if: always()
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if [ -f results/data.json ]; then
          git add results/data.json results/cvs/
          if [ -f results/feedback.json ]; then git add results/feedback.json; fi
          if ! git diff --cached --quiet; then
            git commit -m "Analysis complete [skip ci]"
            git push --force-with-lease origin main
          fi
        fi

  refilter:
    needs: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run Refilter (Fase 3)
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        USER_CITY: ${{ secrets.USER_CITY || 'sevilla' }}
        DESIRED_LOCATIONS: ${{ secrets.DESIRED_LOCATIONS || 'Sevilla,Remoto' }}
        YEARS_OF_EXPERIENCE: '0'
        MIN_SALARY: '0'
      run: |
        python refilter.py --location "$DESIRED_LOCATIONS"
    - name: Commit changes tras refilter
      if: always()
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if [ -f results/data.json ]; then
          git add results/data.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Refilter complete [skip ci]"
            git push --force-with-lease origin main
          fi
        fi

    - name: Cleanup Docker cache
      if: always()
      run: |
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true
