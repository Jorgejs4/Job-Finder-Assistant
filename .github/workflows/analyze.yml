name: Analyze Pending Jobs with Gemini

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Máximo de ofertas a analizar (0=todas)'
        required: false
        default: '0'
      workers:
        description: 'Hilos Gemini paralelos (1-3)'
        required: false
        default: '1'

concurrency:
  group: analyze-run
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcairo2-dev libpango1.0-dev libgdk-pixbuf2.0-dev libffi-dev
        pip install -r requirements.txt

    - name: Run Analysis
      env:
        PYTHONUNBUFFERED: '1'
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        DESIRED_LOCATIONS: ${{ secrets.DESIRED_LOCATIONS || 'Sevilla,Remoto' }}
        YEARS_OF_EXPERIENCE: ${{ secrets.YEARS_OF_EXPERIENCE || '0' }}
        MIN_SALARY: ${{ secrets.MIN_SALARY || '20000' }}
        CV_PATH: 'cv.pdf'
      run: |
        mkdir -p results
        python analyze_pending.py --limit "${{ github.event.inputs.limit || '0' }}" --workers "${{ github.event.inputs.workers || '1' }}"

    - name: Commit results to repo
      if: always()
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if [ -f results/data.json ]; then
          git add results/data.json results/cvs/ 2>/dev/null || true
          if [ -f results/feedback.json ]; then git add results/feedback.json; fi
          if git diff --cached --quiet; then
            echo "No changes to data.json"
          else
            git commit -m "🧠 Gemini analysis complete [skip ci]"
            git fetch origin main
            git rebase -X theirs origin/main || (git rebase --abort && git push origin main)
            git push origin main
          fi
        else
          echo "data.json not found, skipping commit"
        fi
