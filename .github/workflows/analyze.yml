name: Analyze Pending Jobs with Gemini

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Máximo de ofertas a analizar (0=todas)'
        required: false
        default: '0'
      workers:
        description: 'Hilos Gemini paralelos (1-3)'
        required: false
        default: '1'

concurrency:
  group: analyze-run
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        load: true
        tags: job-scraper:latest
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

    - name: Run Analysis
      env:
        PYTHONUNBUFFERED: '1'
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        DESIRED_LOCATIONS: ${{ secrets.DESIRED_LOCATIONS || 'Sevilla,Remoto' }}
        YEARS_OF_EXPERIENCE: ${{ secrets.YEARS_OF_EXPERIENCE || '0' }}
        MIN_SALARY: ${{ secrets.MIN_SALARY || '20000' }}
        CV_PATH: 'cv.pdf'
      run: |
        mkdir -p results
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Background job: commit results every 5 min so dashboard shows progress
        (
          while true; do
            sleep 300
            if [ -f results/data.json ]; then
              git add results/data.json results/cvs/ 2>/dev/null || true
              if ! git diff --cached --quiet; then
                git commit -m "📊 Analysis progress [skip ci]" || true
                git pull --rebase origin main || true
                git push origin main || true
              fi
            fi
          done
        ) &
        COMMIT_PID=$!

        docker run --rm \
          -e PYTHONUNBUFFERED=1 \
          -v "$(pwd)/results:/app/results" \
          -e GEMINI_API_KEY="$GEMINI_API_KEY" \
          -e GEMINI_API_KEYS="$GEMINI_API_KEYS" \
          -e NOTION_TOKEN="$NOTION_TOKEN" \
          -e NOTION_DATABASE_ID="$NOTION_DATABASE_ID" \
          -e DESIRED_LOCATIONS="$DESIRED_LOCATIONS" \
          -e YEARS_OF_EXPERIENCE="$YEARS_OF_EXPERIENCE" \
          -e MIN_SALARY="$MIN_SALARY" \
          -e CV_PATH="$CV_PATH" \
          job-scraper:latest \
          python analyze_pending.py --limit "${{ github.event.inputs.limit || '0' }}" --workers "${{ github.event.inputs.workers || '1' }}"

        kill $COMMIT_PID 2>/dev/null || true

    - name: Commit results to repo
      if: always()
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if [ -f results/data.json ]; then
          git add results/data.json results/cvs/ 2>/dev/null || true
          if [ -f results/feedback.json ]; then git add results/feedback.json; fi
          if git diff --cached --quiet; then
            echo "No changes to data.json"
          else
            git commit -m "🧠 Gemini analysis complete [skip ci]"
            git pull --rebase origin main || true
            git push --force-with-lease origin main
          fi
        else
          echo "data.json not found, skipping commit"
        fi

    - name: Cleanup Docker cache
      if: always()
      run: |
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true
