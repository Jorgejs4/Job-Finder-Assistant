name: Refilter Jobs by Location

on:
  workflow_dispatch:
    inputs:
      city:
        description: 'Ciudad deseada (ej: Sevilla, Madrid, London)'
        required: false
        default: 'Sevilla'
      archive:
        description: 'Archivar ofertas eliminadas'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: refilter-run
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  refilter:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run refilter
      env:
        USER_CITY: ${{ secrets.USER_CITY || 'sevilla' }}
      run: |
        python refilter.py --location "${{ inputs.city || 'Sevilla' }}"

    - name: Commit results
      if: always()
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if [ -f results/data.json ]; then
          git add results/data.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes after refilter"
          else
            git commit -m "Refilter: archivadas ofertas fuera de ${{ inputs.city || 'Sevilla' }} [skip ci]"
            git pull --rebase origin main || true
            git push --force-with-lease origin main
          fi
        fi
