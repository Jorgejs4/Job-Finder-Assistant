name: Job Scraper and Notion Sync

on:
  schedule:
    # Se ejecuta cada 12 horas: 8:00 y 20:00 UTC
    - cron: '0 8,20 * * *'
  workflow_dispatch:
    inputs:
      desired_locations:
        description: 'Ubicaciones de búsqueda (separadas por comas, ej: Sevilla,Remoto)'
        required: true
        default: 'Sevilla,Remoto'
      years_of_experience:
        description: 'Años de experiencia requeridos'
        required: false
        default: '0'
      min_salary:
        description: 'Salario mínimo deseado (vacío para omitir)'
        required: false
        default: '20000'

concurrency:
  group: scraper-run
  cancel-in-progress: true

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        load: true
        tags: job-scraper:latest
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

    - name: Run Scraper
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        DESIRED_LOCATIONS: ${{ github.event.inputs.desired_locations || secrets.DESIRED_LOCATIONS || 'Sevilla,Remoto' }}
        YEARS_OF_EXPERIENCE: ${{ github.event.inputs.years_of_experience || secrets.YEARS_OF_EXPERIENCE || '0' }}
        MIN_SALARY: ${{ github.event.inputs.min_salary || secrets.MIN_SALARY || '20000' }}
        CV_PATH: 'cv.pdf'
      run: |
        docker run --rm \
          -e GEMINI_API_KEY="$GEMINI_API_KEY" \
          -e NOTION_TOKEN="$NOTION_TOKEN" \
          -e NOTION_DATABASE_ID="$NOTION_DATABASE_ID" \
          -e RAPIDAPI_KEY="$RAPIDAPI_KEY" \
          -e DESIRED_LOCATIONS="$DESIRED_LOCATIONS" \
          -e YEARS_OF_EXPERIENCE="$YEARS_OF_EXPERIENCE" \
          -e MIN_SALARY="$MIN_SALARY" \
          -e CV_PATH="$CV_PATH" \
          job-scraper:latest

    - name: Post-run cleanup
      if: always()
      run: |
        # Limpiar caché de Docker antiguo
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true
